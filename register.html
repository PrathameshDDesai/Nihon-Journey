<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nihon Journey - Register</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Style Sheets -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark.css">
    <style>
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            min-height: 100vh;
            padding: 20px;
            background-image: var(--seigaiha-pattern);
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            animation: fadeIn 0.5s ease-out;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .auth-logo {
            font-size: 3rem;
            margin-bottom: 12px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        .auth-title {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        .auth-subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .auth-footer-text {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 20px;
        }

        .auth-footer-text a {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
            transition: var(--transition);
        }

        .auth-footer-text a:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loading-screen">
        <div class="torii-loader">⛩️</div>
        <h2>Nihon Journey</h2>
        <p>Creating your training scroll...</p>
    </div>

    <div class="auth-container">
        <div class="nihon-card auth-card">
            <div class="auth-header">
                <span class="auth-logo">⛩️</span>
                <h2 class="auth-title">Nihon Journey</h2>
                <p class="auth-subtitle">Create a study account (日本旅行)</p>
            </div>

            <!-- Register Form -->
            <form id="register-form">
                <div class="form-group">
                    <label for="register-name" class="form-label">Full Name</label>
                    <input type="text" id="register-name" class="form-control" placeholder="Learner-san" required>
                </div>

                <div class="form-group">
                    <label for="register-email" class="form-label">Email Address</label>
                    <input type="email" id="register-email" class="form-control" placeholder="your.name@example.com" required>
                </div>
                
                <div class="form-group">
                    <label for="register-password" class="form-label">Password (min 6 characters)</label>
                    <input type="password" id="register-password" class="form-control" placeholder="••••••••" minlength="6" required>
                </div>

                <div class="form-group">
                    <label for="register-confirm-password" class="form-label">Confirm Password</label>
                    <input type="password" id="register-confirm-password" class="form-control" placeholder="••••••••" minlength="6" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width:100%; margin-top:24px; justify-content:center;">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <div class="auth-footer-text">
                Already have an account? <a href="login.html">Sign in instead</a>
            </div>
        </div>
    </div>

    <!-- Firebase Core and Services compat libraries -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/database.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/app.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const registerForm = document.getElementById('register-form');

            // Form Submit
            registerForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const name = document.getElementById('register-name').value;
                const email = document.getElementById('register-email').value;
                const password = document.getElementById('register-password').value;
                const confirmPassword = document.getElementById('register-confirm-password').value;
                
                if (password !== confirmPassword) {
                    window.NihonAuth.showToast('Validation Error', 'Passwords do not match.', 'danger');
                    return;
                }

                const loader = document.getElementById('loading-screen');
                if (loader) loader.classList.remove('hidden');

                const res = await window.NihonAuth.signUp(email, password, name);
                if (!res.success && loader) {
                    loader.classList.add('hidden');
                }
            });
        });
    </script>
</body>
</html>
