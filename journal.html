<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nihon Journey - Learning Journal</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Style Sheets -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/journal.css">
    <link rel="stylesheet" href="css/dark.css">
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loading-screen">
        <div class="torii-loader">⛩️</div>
        <h2>Nihon Journey</h2>
        <p>Opening your learning diary...</p>
    </div>

    <div class="app-container">
        <!-- Sidebar Injection -->
        <aside id="sidebar-container"></aside>

        <!-- Main Wrapper -->
        <div class="main-wrapper">
            <!-- Header Injection -->
            <header id="header-container"></header>

            <main id="main-content">
                <div class="journal-container">
                    
                    <!-- Left Column: The Notebook Page Editor -->
                    <div class="notebook-page">
                        
                        <!-- Notebook Sheet Header -->
                        <div class="notebook-header">
                            <div class="notebook-date">
                                <i class="fas fa-book" style="color: var(--primary);"></i>
                                <span id="journal-header-date-text">Wednesday, July 8, 2026</span>
                            </div>
                            <div style="display:flex; align-items:center; gap:16px;">
                                <div id="journal-save-status" class="save-status idle">
                                    <i class="far fa-edit"></i> Auto-saving enabled
                                </div>
                                <input type="date" id="journal-date-picker" class="filter-select" style="padding: 6px 12px; font-weight:700;">
                                <button class="btn btn-secondary" onclick="jumpToTodayJournal()" style="padding: 6px 12px; font-size:0.8rem;">Go to Today</button>
                            </div>
                        </div>

                        <!-- Lined Form Prompts -->
                        <div class="journal-form">
                            <!-- Prompt 1: What I learned today -->
                            <div class="journal-section-card">
                                <span class="journal-section-title"><i class="fas fa-graduation-cap"></i> What I Learned Today</span>
                                <textarea id="journal-learned-today" class="journal-textarea" placeholder="Describe the topics you studied today..."></textarea>
                            </div>

                            <!-- Row for Kanji & Vocab -->
                            <div class="journal-row-two-col">
                                <div class="journal-section-card">
                                    <span class="journal-section-title"><i class="font">字</i> New Kanji</span>
                                    <textarea id="journal-new-kanji" class="journal-textarea" placeholder="e.g. 本 (hon - book), 日 (hi - sun)..." style="min-height:70px;"></textarea>
                                </div>
                                <div class="journal-section-card">
                                    <span class="journal-section-title"><i class="fas fa-language"></i> New Vocabulary</span>
                                    <textarea id="journal-new-vocab" class="journal-textarea" placeholder="e.g. 友達 (tomodachi - friend)..." style="min-height:70px;"></textarea>
                                </div>
                            </div>

                            <!-- Row for Grammar & Difficult Topics -->
                            <div class="journal-row-two-col">
                                <div class="journal-section-card">
                                    <span class="journal-section-title"><i class="fas fa-code-branch"></i> Grammar Notes</span>
                                    <textarea id="journal-grammar-notes" class="journal-textarea" placeholder="e.g. studied particle particles に vs で..." style="min-height:70px;"></textarea>
                                </div>
                                <div class="journal-section-card">
                                    <span class="journal-section-title"><i class="fas fa-question-circle"></i> Difficult Topics / Doubts</span>
                                    <textarea id="journal-difficult" class="journal-textarea" placeholder="What was hard or needs review tomorrow?..." style="min-height:70px;"></textarea>
                                </div>
                            </div>

                            <!-- Prompt 6: Tomorrow's Goal -->
                            <div class="journal-section-card">
                                <span class="journal-section-title"><i class="fas fa-bullseye"></i> Tomorrow's Study Goal</span>
                                <textarea id="journal-tomorrow-goal" class="journal-textarea" placeholder="What are your plans to study tomorrow?..." style="min-height:60px;"></textarea>
                            </div>
                        </div>

                    </div>

                    <!-- Right Column: Sidebar Past Entries List -->
                    <div class="journal-history-panel">
                        <h3 style="font-weight:800; font-size:1.1rem; display:flex; align-items:center; gap:8px;">
                            <i class="fas fa-history" style="color:var(--primary);"></i>Past Entries
                        </h3>
                        
                        <div class="search-box" style="max-width:100%; min-width:100%;">
                            <i class="fas fa-search"></i>
                            <input type="search" id="journal-history-search" placeholder="Search journals..." class="form-control" style="padding: 8px 12px 8px 36px; font-size:0.85rem;">
                        </div>

                        <div class="journal-history-list" id="journal-history-list">
                            <!-- Injected dynamically by journal.js -->
                        </div>
                    </div>

                </div>
            </main>
        </div>
    </div>

    <!-- Core & Page Services Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/app.js"></script>
    <script src="js/journal.js"></script>
</body>
</html>
